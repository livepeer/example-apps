# Offchain demo (infra side): orchestrator + vLLM OpenAI server + a registrar
# that advertises vLLM as a Live Runner. Requires an NVIDIA GPU for vLLM.
#
#   docker compose up -d --build
#   uv run gateway.py &                  # local gateway (OpenAI->Livepeer) on the host
#   uv run client.py --prompt "Hello!"   # stock openai -> the local gateway on :8080
#
# The orchestrator is defined once in ../compose.orchestrator.yml and pulled in
# with `extends`. This file is the network side; the local gateway + OpenAI
# client are consumer-side and run on the host (see gateway.py / client.py).

services:
  orchestrator:
    extends:
      file: ../compose.orchestrator.yml
      service: orchestrator

  vllm:
    image: vllm/vllm-openai:latest
    container_name: example_apps_vllm
    # A tiny instruct model so the demo fits a modest GPU; override with VLLM_MODEL.
    # gpu-memory-utilization caps VRAM: vLLM's default (0.9) can exceed free memory
    # on a shared GPU and refuse to start. 0.5 is plenty for a small model.
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}"
      - "--port"
      - "8000"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEM_UTIL:-0.5}"
    environment:
      # Only needed for gated models; leave empty otherwise.
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    # vLLM needs an NVIDIA GPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # vLLM serves plain HTTP on 8000 and the image has curl; hit /health.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 60          # model download + load can take a while
      start_period: 20s

  runner:
    build: .
    container_name: example_apps_vllm_runner
    # Register only once both the orchestrator and vLLM are ready.
    depends_on:
      orchestrator:
        condition: service_healthy
      vllm:
        condition: service_healthy
    command:
      - python
      - runner.py
      - --orchestrator=https://orchestrator:8935
      - --orchSecret=abcdef
      - --runner-url=http://vllm:8000
