# On-chain payment overlay for the vLLM example. Layer it on the offchain base:
#   docker compose -f docker-compose.yml -f docker-compose.onchain.yml up -d --build
#
# Adds the shared remote signer, re-points the orchestrator on-chain (see
# ../compose.onchain.yml), and registers vLLM with a price so the orchestrator
# issues a payment challenge. Requires a local .env (gitignored); copy
# .env.example and fill it in. Run the gateway with --signer so it pays per
# request; the client stays unchanged stock OpenAI:
#   uv run gateway.py --signer http://localhost:7936 &
#   uv run client.py --prompt "Hello!"

services:
  signer:
    extends:
      file: ../compose.onchain.yml
      service: signer
    ports:
      - "7936:7936"

  orchestrator:
    extends:
      file: ../compose.onchain.yml
      service: orchestrator

  # Re-declare the command to advertise a price (base file registers free).
  runner:
    command:
      - python
      - runner.py
      - --orchestrator=https://orchestrator:8935
      - --orchSecret=abcdef
      - --runner-url=http://vllm:8000
      - --price=${PRICE_PER_UNIT}
      - --pixels-per-unit=${PIXELS_PER_UNIT}
